<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>search for a book</title>
    <link rel="stylesheet" href="../Navbar/Navbar.css">
    <link rel="stylesheet" href="User Search.CSS">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=dark_mode" />

</head>

<body>
    <nav class="navbar">
        <a href="../Book details/User Books list.html" target="_self" class="logo">Book Hub</a>
        <ul class="nav-links">

            <li><a href="../Book details/User Books list.html" target="_self">Home</a></li>
            <hr class="hr">
            <li><a href="../Book details/User Books list.html" target="_self">Book List</a></li>
            <hr class="hr">
            <li><a href="User Search.html" target="_self">Search</a></li>
            <hr class="hr">
            <li><a id="notInLogout" href="../Borrowed Books/Borrowed Books.html" target="_self">My Borrowed Books</a></li>
            <hr class="hr">
             <li><a id="logoutb" href="../register pages\login.html" target="_self">Logout</a></li>
            <li><a id="loginb" href="../register pages\login.html" target="_self">Log In</a></li>
        </ul>
        <button class="material-symbols-outlined" title="change_mode" onclick="toggleDarkMode()">dark_mode</button>
        <div class="menu-toggle">&#9776;</div>
    </nav>
    <script src="../Navbar/Navbar.js"></script>

    <div class="search">
        <h1> Search For a Book </h1>
        <div class="searchbox">
            <div class="search-bar">
                <select id="search-filter">
                    <option value="all">All</option>
                    <option value="title">Title</option>
                    <option value="author">Author</option>
                    <option value="category">Category</option>
                </select>
                <input type="text" placeholder="Search for a book...">
            </div>
            <button class="button">search</button>
        </div>
    </div>
    
    <div class="books">
        <div class="bookgroup">
            <h2 class="grouptitle">Available Books</h2>
            <div id="available-grid" class="books-grid">
                </div>
        </div>

        <div class="bookgroup">
            <h2 class="grouptitle">Not Available Books</h2>
            <div id="unavailable-grid" class="books-grid">
                <p class="emptymsg">No books currently unavailable.</p>
            </div>
        </div>
    </div>

    <script src="search.js"></script>
</body>
</html>
